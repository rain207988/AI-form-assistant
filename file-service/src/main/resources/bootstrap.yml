server:
  port: 9003

spring:
  application:
    name: file-service
  cloud:
    nacos:
      config:
        server-addr: 192.168.100.232:8848
        username: nacos
        password: ${NACOS_PASSWORD:change-me}
        file-extension: yml
        namespace: public
        group: DEFAULT_GROUP
      discovery:
        server-addr: 192.168.100.232:8848
        username: nacos
        password: ${NACOS_PASSWORD:change-me}
        namespace: public

  # MySQL数据源配置
  datasource:
    url: jdbc:mysql://192.168.100.232:3306/bite_excel?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: bite
    password: ${MYSQL_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Jackson配置
  jackson:
    date-format: HH:mm:ss
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
      fail-on-null-for-primitives: false
      accept-empty-string-as-null-object: true
      accept-single-value-as-array: true

  # Spring Retry配置
  retry:
    enabled: true
    max-attempts: 3
    initial-interval: 1000
    max-interval: 10000
    multiplier: 2.0

  # Redis配置
  data:
    redis:
      host: 192.168.100.232
      port: 6379
      password: ${REDIS_PASSWORD:change-me}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 0
      location: ${java.io.tmpdir}

# MyBatis Plus公共配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true

# 阿里云OSS配置
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:your-oss-access-key-id}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-oss-access-key-secret}
    bucket-name: bite-lz
    max-size: 52428800

# 安全配置 - 网关令牌
security:
  gateway:
    token: ${GATEWAY_INTERNAL_TOKEN:change-me}
    enabled: true

# 自定义日志配置
logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){cyan} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
