version: '3.8'
#启动命令 docker compose -p bite_excel -f docker-compose-nginx.yml up -d
services:
  bite_excel-web:
    image: nginx:1.24.0
    container_name: bite_excel-web
    restart: always
    networks:
      - bite_excel_network
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/web/dist:/data/bite_exceldata/web/dist
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000
networks:
  bite_excel_network: