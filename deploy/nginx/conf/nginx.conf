worker_processes auto;
worker_cpu_affinity auto;
# 最大打开文件数，可设置为系统优化后的ulimit -HSn的结果，调整系统文件描述和这个问题有相同之处
# 需要调整系统打开文件数量
worker_rlimit_nofile 65535;

events {
    use epoll;
    worker_connections  10000;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # WebSocket连接升级映射
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Gateway服务上游配置
    # 注意：Gateway服务在宿主机上运行（端口8080），不在Docker容器中
    # Windows/Mac: 使用 host.docker.internal
    # Linux: 如果 host.docker.internal 不可用，请使用宿主机IP地址，例如: server 192.168.1.100:8080;
    upstream bitegateway {
        server 192.168.100.232:8080;
        keepalive 1000;
    }

    # 服务端
    server {
        listen       80;
        server_name  "";
        client_max_body_size 100M;

        # 静态文件服务 - 前端应用
        location / {
            root   /data/bite_exceldata/web/dist;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }

        # API请求转发到Gateway
        # 匹配所有 /api/v1/** 路径，转发到Gateway服务（8080端口）
        location /api/v1/ {
            proxy_http_version 1.1;
            
            # 基础请求头设置
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket支持（用于流式响应）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 转发到Gateway服务
            proxy_pass http://bitegateway;
            
            # 超时设置（AI流式响应可能需要较长时间）
            proxy_connect_timeout    300s;
            proxy_read_timeout       300s;
            proxy_send_timeout       300s;
            
            # 缓冲设置（关闭缓冲以支持流式响应）
            proxy_buffering off;
            proxy_request_buffering off;
            
            # 禁用缓存
            add_header Cache-Control no-store;
            add_header Pragma no-cache;
        }
    }
}
