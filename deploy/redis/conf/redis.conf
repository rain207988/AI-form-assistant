# Redis configuration for docker-compose

bind 0.0.0.0
# 监听所有网络接口
protected-mode no
# 关闭保护模式（Docker 环境）
port 6379
# 端口号

# Data directory (mounted at /data)
dir /data
# 数据目录
appendonly yes
# 开启 AOF 持久化
appendfsync everysec
# 每秒同步一次

logfile ""
# 日志输出到标准输出
databases 16
# 数据库数量
timeout 0
# 连接超时（0 表示不超时）
tcp-keepalive 300
# TCP 保活时间